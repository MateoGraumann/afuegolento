{% extends "base.html" %}
{% block title %}Reportes | Pizzería BO{% endblock %}
{% block page_title %}Reportes{% endblock %}
{% block content %}
<div class="card mb-3 bo-content-card">
  <div class="card-body">
    <form method="get" class="row g-3 align-items-end bo-form">
      <div class="col-md-4">
        <label class="form-label text-dark">Fecha desde</label>
        <input class="form-control" type="date" name="start_date" value="{{ start_date }}">
      </div>
      <div class="col-md-4">
        <label class="form-label text-dark">Fecha hasta</label>
        <input class="form-control" type="date" name="end_date" value="{{ end_date }}">
      </div>
      <div class="col-md-4">
        <button class="btn btn-primary" type="submit">Filtrar</button>
      </div>
    </form>
  </div>
</div>

<div class="row g-5">
  <div class="col-md-4">
    <div class="card bo-content-card"><div class="card-body"><div class="bo-kpi-title">Ingresos totales</div><div class="h3 mb-0 bo-kpi-value">{{ summary.total_revenue }}</div></div></div>
  </div>
  <div class="col-md-4">
    <div class="card bo-content-card"><div class="card-body"><div class="bo-kpi-title">Costos totales</div><div class="h3 mb-0 bo-kpi-value">{{ summary.total_cost }}</div></div></div>
  </div>
  <div class="col-md-4">
    <div class="card bo-content-card"><div class="card-body"><div class="bo-kpi-title">Ganancia total</div><div class="h3 mb-0 bo-kpi-value">{{ summary.total_profit }}</div></div></div>
  </div>
</div>
{% endblock %}
